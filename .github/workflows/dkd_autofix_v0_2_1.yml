name: DraBornGate v0.2.1 Autofix

on:
  push:
    branches: [autofix/v0.2.1]

permissions:
  contents: write

jobs:
  patch-main:
    runs-on: ubuntu-latest
    steps:
      - name: Ana dalı al
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: React 19 ref türlerini düzelt
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/store/GateContext.tsx')
          text = path.read_text(encoding='utf-8')
          old = "const latestNotificationId = useRef<string>();"
          new = "const latestNotificationId = useRef<string | undefined>(undefined);"
          if old not in text and new not in text:
              raise SystemExit('Beklenen latestNotificationId satırı bulunamadı')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Değişikliği main dalına gönder
        run: |
          git config user.name "DraBornGate Otomasyon"
          git config user.email "actions@users.noreply.github.com"
          git add src/store/GateContext.tsx
          if git diff --cached --quiet; then
            echo "Düzeltme zaten uygulanmış."
          else
            git commit -m "Fix GateContext ref typing for v0.2.1"
            git push origin HEAD:main
          fi
