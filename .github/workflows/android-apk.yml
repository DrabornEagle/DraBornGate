name: Android Demo APK
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "App.tsx"
      - "src/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "supabase/**"
      - ".github/workflows/android-apk.yml"
jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npx expo prebuild --platform android --clean --non-interactive
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk DraBornGate-v0.0.2.apk
      - uses: actions/upload-artifact@v4
        with:
          name: DraBornGate-v0.0.2
          path: DraBornGate-v0.0.2.apk
          retention-days: 14
