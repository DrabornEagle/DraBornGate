name: Android Demo APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "App.tsx"
      - "src/**"
      - "assets/**"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npm run typecheck

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk DraBornGate-v0.1-demo.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DraBornGate-v0.1-demo
          path: DraBornGate-v0.1-demo.apk
          retention-days: 14
