name: DraBornGate v0.3.2 Turkish Cleanup

on:
  push:
    branches: [release/v0.3.2]
    paths:
      - scripts/dkd_v032_text_cleanup.mjs
      - .github/workflows/dkd_apply_v0_3_2_cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.3.2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/dkd_v032_text_cleanup.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src package-lock.json
          if git diff --cached --quiet; then
            echo "Değişiklik yok"
          else
            git commit -m "Translate remaining DraBornGate interface terms [skip ci]"
            git push origin HEAD:release/v0.3.2
          fi
