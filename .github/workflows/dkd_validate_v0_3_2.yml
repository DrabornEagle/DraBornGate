name: DraBornGate v0.3.2 Validate

on:
  push:
    branches: [main, release/v0.3.2]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: draborngate-v0-3-2-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4

      - name: Node.js 22 kur
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bağımlılıkları kur
        run: npm install --no-audit --no-fund

      - name: TypeScript tanılaması
        run: npm run typecheck

      - name: Android Expo dışa aktarma testi
        run: npx expo export --platform android --output-dir dist --max-workers 2 --no-bytecode

      - name: Sürüm ve v0.3.2 kapsam doğrulaması
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const pkg = require('./package.json');
          const app = require('./app.json').expo;
          const versionFile = fs.readFileSync('./src/config/version.ts', 'utf8');
          const expected = '0.3.2';
          if (pkg.version !== expected) throw new Error(`package.json sürümü ${pkg.version}`);
          if (app.version !== expected || app.extra?.appVersion !== expected || app.extra?.demoDataVersion !== expected) throw new Error('Uygulama sürümleri eşleşmiyor');
          if (app.android.versionCode !== 1) throw new Error(`Android versionCode ${app.android.versionCode}`);
          if (!versionFile.includes(`APP_VERSION = '${expected}'`) || !versionFile.includes(`DEMO_DATA_VERSION = '${expected}'`) || !versionFile.includes('ANDROID_VERSION_CODE = 1')) throw new Error('version.ts eşleşmiyor');

          const auth = fs.readFileSync('./src/screens/AuthScreen.tsx', 'utf8');
          for (const token of ['Güvenlik', 'Site Sakini', 'SiteSearchSelect', 'selected_site_id']) if (!auth.includes(token)) throw new Error(`Kayıt akışı eksik: ${token}`);
          const appSource = fs.readFileSync('./App.tsx', 'utf8');
          for (const token of ['SiteRoleAccessGate', 'CourierCenterV032', 'ManagementProCenter']) if (!appSource.includes(token)) throw new Error(`Rol yönlendirmesi eksik: ${token}`);
          const packageSource = fs.readFileSync('./src/screens/ManagementProCenter.tsx', 'utf8');
          for (const token of ['Google Play', 'checkmark-circle', 'SiteRoleApplicationsManager']) if (!packageSource.includes(token)) throw new Error(`Paket merkezi eksik: ${token}`);
          const courierSource = fs.readFileSync('./src/screens/CourierCenterV032.tsx', 'utf8');
          for (const token of ['Kurye Paketleri', 'dkd_gate_get_courier_package_center', 'Google Play']) if (!courierSource.includes(token)) throw new Error(`Kurye paket merkezi eksik: ${token}`);
          const migration = fs.readdirSync('./supabase/migrations').find(x => x.includes('draborngate_v0_3_2'));
          if (!migration) throw new Error('v0.3.2 migration dosyası yok');

          const activeFiles = [];
          const walk = (dir) => fs.readdirSync(dir, { withFileTypes: true }).forEach(entry => {
            const full = path.join(dir, entry.name);
            if (entry.isDirectory()) walk(full);
            else if (/\.(ts|tsx|js|json)$/.test(entry.name)) activeFiles.push(full);
          });
          walk('./src');
          activeFiles.push('./App.tsx', './app.json', './app.config.js');
          const forbidden = /\biban\b|bank_reference|receipt_path|subscriptionMedia|dekont/iu;
          for (const file of activeFiles) {
            const source = fs.readFileSync(file, 'utf8');
            if (forbidden.test(source)) throw new Error(`Kaldırılan alternatif ödeme kalıntısı: ${file}`);
          }
          console.log('DraBornGate v0.3.2 doğrulandı. Android versionCode 1.');
          NODE
