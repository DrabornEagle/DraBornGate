name: Apply DraBornGate v0.3.1 patches

on:
  push:
    branches: [release/v0.3.1]
    paths:
      - scripts/dkd_apply_v0_3_1_patches.mjs
      - .github/workflows/dkd_apply_v0_3_1_patches.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: draborngate-v0-3-1-patcher
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4
        with:
          ref: release/v0.3.1
          fetch-depth: 0

      - name: Hedefli yamaları uygula
        run: node scripts/dkd_apply_v0_3_1_patches.mjs

      - name: Değişiklikleri doğrula ve yükle
        shell: bash
        run: |
          set -e
          if git diff --quiet; then
            echo "Uygulanacak yeni değişiklik yok."
            exit 0
          fi
          git config user.name "DraBornGate Automation"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Apply DraBornGate v0.3.1 targeted fixes"
          git push origin HEAD:release/v0.3.1
